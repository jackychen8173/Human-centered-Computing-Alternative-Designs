<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternative Design - Solo Quest Run</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #1a1a1a; }
        .phone-frame { width: 375px; height: 812px; background: #fafafa; border-radius: 40px; border: 8px solid #333; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); position: relative; }
        .status-bar { height: 44px; background: #ffffff; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 12px; }
        .header { height: 60px; background: #ffffff; display: flex; align-items: center; padding: 0 16px; border-bottom: 2px solid #e0e0e0; }
        .header-back { font-size: 20px; margin-right: 12px; cursor: pointer; color: #4A90E2; }
        .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; flex: 1; color: #1a1a1a; }
        .header-menu { font-size: 20px; cursor: pointer; color: #888; }
        .content { height: calc(812px - 104px - 160px); overflow-y: auto; padding: 16px; }
        .run-indicator { background: linear-gradient(135deg, #3a4a5a 0%, #2a3a4a 100%); border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 16px; border: 1px solid #4A90E2; }
        .run-status { font-size: 16px; font-weight: 700; color: #4A90E2; margin-bottom: 6px; }
        .run-info { font-size: 13px; color: #aaa; }
        .battle-area { background: #f8f8f8; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #4a4a4a; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .enemy-display { font-size: 64px; margin-bottom: 16px; }
        .enemy-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .health-bar-bg { width: 100%; background: #ffffff; height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
        .health-bar-fill { background: linear-gradient(90deg, #ff4444, #ff8888); height: 100%; width: 73%; transition: width 0.3s; }
        .health-text { font-size: 13px; color: #aaa; }
        .damage-display { background: #ffffff; border-radius: 8px; padding: 12px; margin-bottom: 16px; text-align: center; }
        .damage-label { font-size: 12px; color: #888; margin-bottom: 4px; text-transform: uppercase; }
        .damage-value { font-size: 24px; font-weight: 700; color: #4A90E2; font-family: 'Bebas Neue', sans-serif; }
        .other-quests { background: #f8f8f8; border-radius: 12px; padding: 14px; border: 1px solid #4a4a4a; }
        .quests-header { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .quest-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-size: 13px; color: #666; }
        .quest-item:not(:last-child) { border-bottom: 2px solid #e0e0e0; }
        .bottom-section { position: absolute; bottom: 0; left: 0; right: 0; background: #fafafa; padding: 16px; border-top: 2px solid #e0e0e0; }
        .button-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .action-btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .save-btn { background: #4a4a4a; color: #1a1a1a; border: 1px solid #5a5a5a; }
        .finish-btn { background: #4A90E2; color: white; }
        .finish-btn:hover { background: #3a7fc2; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4); }
        .navigation-hint { position: absolute; top: 50%; left: 16px; font-size: 12px; color: #666; }
        .nav-link { color: #4A90E2; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
        <div class="header">
            <div class="header-back" onclick="window.location.href='screen4-alt-guild.html'">←</div>
            <div class="header-title">Dragon's Lair - Hard</div>
            <div class="header-menu">⋮</div>
        </div>
        <div class="content">
            <div class="run-indicator">
                <div class="run-status">Your Solo Run</div>
                <div class="run-info">Contribute anytime - no time pressure</div>
            </div>

            <div class="battle-area">
                <div class="enemy-display">🐉</div>
                <div class="enemy-name">Ancient Dragon</div>
                <div class="health-bar-bg">
                    <div class="health-bar-fill"></div>
                </div>
                <div class="health-text">7,320 / 10,000 HP remaining</div>
            </div>

            <div class="damage-display">
                <div class="damage-label">Your Contribution This Run</div>
                <div class="damage-value">2,680 Damage</div>
            </div>

            <div class="other-quests">
                <div class="quests-header">Active Contributions</div>
                <div class="quest-item">
                    ⚔️ Dragon's Lair: 2,680 dmg this run
                </div>
                <div class="quest-item">
                    🏰 Shadow Keep: 12 relics collected
                </div>
            </div>
        </div>
        <div class="bottom-section">
            <div class="button-row">
                <button class="action-btn save-btn">Save & Exit</button>
                <button class="action-btn finish-btn" onclick="alert('Run complete! +2,680 damage added to guild total.'); window.location.href='screen4-alt-guild.html'">Finish Run</button>
            </div>
        </div>
        <div class="navigation-hint"><a href="screen4-alt-guild.html" class="nav-link">← Back</a></div>
    </div>
</body>
</html>
